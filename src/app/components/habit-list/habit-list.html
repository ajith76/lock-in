<section class="habit-list card" id="habit-list-section">
  <div class="habit-list__header">
    <h2 class="habit-list__title">Habits</h2>
    <button class="habit-list__add" id="add-habit-btn" (click)="svc.addHabit()" aria-label="Add new habit">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>Add</span>
    </button>
  </div>
  <div class="habit-list__items">
    @for (habit of svc.habits(); track habit.id) {
      <app-habit-item
        [habit]="habit"
        (nameChange)="svc.updateHabitName(habit.id, $event)"
        (delete)="svc.removeHabit(habit.id)"
      />
    } @empty {
      <p class="habit-list__empty">No habits yet. Click + to add one.</p>
    }
  </div>
</section>
