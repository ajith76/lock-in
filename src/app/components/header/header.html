<header class="header" id="app-header">
  <div class="header__left">
    <h1 class="header__title">Lock In</h1>
    <span class="header__subtitle">Habit Tracker</span>
  </div>

  <div class="header__nav">
    <button class="header__nav-btn" id="prev-month-btn" (click)="habitService.navigateMonth(-1)" aria-label="Previous month">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="header__month" id="month-label">{{ habitService.monthLabel() }}</span>
    <button class="header__nav-btn" id="next-month-btn" (click)="habitService.navigateMonth(1)" aria-label="Next month">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <div class="header__right">
    @if (authService.currentUser(); as user) {
      <div class="header__user">
        <span class="header__user-name">{{ user.name }}</span>
        <button class="header__logout-btn" id="logout-btn" (click)="logout()" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    }
  </div>
</header>
